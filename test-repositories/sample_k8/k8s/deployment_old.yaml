apiVersion: apps/v1
kind: Deployment

metadata:
  name: sample-k8s-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sample-k8s-app

  template:
    metadata:
      labels:
        app: sample-k8s-app

    spec:
      containers:
        - name: sample-k8s-app

          image: sample-k8s-app:latest

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 30
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 20
            periodSeconds: 20